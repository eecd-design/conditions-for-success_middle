description: >-
  This webinar introduces Universal Design for Learning (UDL), a framework for
  designing flexible lessons that meet the needs of all learners from the start.
  Participants will explore the three core UDL principles — engagement,
  representation, and action/expression — and how to apply them in real
  classroom or course design.
